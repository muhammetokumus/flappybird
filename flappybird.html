<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sihirli Uçuş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #030010;
            /* touch-action: none burada OLMASIN – iOS'ta buton dokunuşunu kesiyor */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: radial-gradient(ellipse at center, #0d0030 0%, #030010 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        #game-wrapper {
            /* JS will set transform scale */
            transform-origin: top center;
            width: 480px;
            height: 640px;
            flex-shrink: 0;
        }

        #game-container {
            position: relative;
            width: 480px;
            height: 640px;
            border: 2px solid #3a0080;
            border-radius: 4px;
            box-shadow:
                0 0 40px rgba(138, 43, 226, 0.6),
                0 0 80px rgba(138, 43, 226, 0.2),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            /* touch-action game JS tarafından yönetilir */
        }

        #game-canvas {
            display: block;
            touch-action: none; /* sadece canvas'ta – butonları etkilemez */
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 14px 18px;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            font-size: 2.8em;
            font-weight: bold;
            color: #fff;
            text-shadow:
                0 0 10px rgba(0, 255, 196, 0.8),
                0 2px 4px rgba(0, 0, 0, 0.8);
            line-height: 1;
        }

        #best-display {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            margin-top: 6px;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s;
            z-index: 100;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            background: rgba(5, 0, 20, 0.82);
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .overlay-content,
        .popup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 36px 44px;
            background: rgba(10, 0, 40, 0.92);
            border: 1px solid rgba(138, 43, 226, 0.5);
            border-radius: 16px;
            box-shadow:
                0 0 30px rgba(138, 43, 226, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            min-width: 280px;
        }

        h1 {
            font-size: 2.2em;
            color: #e0d0ff;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.9);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.95em;
            color: rgba(200, 180, 255, 0.7);
            margin-top: -8px;
        }

        .hint {
            font-size: 0.82em;
            color: rgba(180, 160, 255, 0.5);
            margin-top: -4px;
        }

        .lose-title {
            font-size: 2em;
            color: #ff4466;
            text-shadow: 0 0 15px rgba(255, 68, 102, 0.8);
            letter-spacing: 3px;
        }

        @keyframes pulse {
            from { transform: scale(1);    opacity: 0.9; }
            to   { transform: scale(1.06); opacity: 1;   }
        }

        .score-row {
            display: flex;
            gap: 32px;
            margin: 4px 0;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .score-label {
            font-size: 0.75em;
            color: rgba(200, 180, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ffc4;
            text-shadow: 0 0 10px rgba(0, 255, 196, 0.7);
        }

        .record-badge {
            font-size: 0.78em;
            color: #ffd700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
            letter-spacing: 1px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(138, 43, 226, 0.5), transparent);
            margin: 2px 0;
        }

        /* Buttons */
        .btn {
            padding: 14px 40px;
            border: 2px solid #00ffc4;
            background: transparent;
            color: #00ffc4;
            font-size: 1.1em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            margin-top: 4px;
            /* iOS bigger tap target */
            min-height: 48px;
            touch-action: manipulation;
        }

        .btn:hover,
        .btn:focus {
            background: #00ffc4;
            color: #050010;
            box-shadow: 0 0 24px rgba(0, 255, 196, 0.7);
            transform: scale(1.04);
            outline: none;
        }

        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="game-canvas"></canvas>

            <div id="hud">
                <div id="score-display">0</div>
                <div id="best-display">En İyi: 0</div>
            </div>

            <div id="start-screen" class="overlay active">
                <div class="overlay-content">
                    <h1>Sihirli Uçuş</h1>
                    <p class="subtitle">Engelleri aş, ne kadar gidebilirsin?</p>
                    <p class="hint">Ekrana dokun veya BOŞLUK tuşuna bas</p>
                    <button id="start-button" class="btn">BAŞLAT</button>
                </div>
            </div>

            <div id="game-over-screen" class="overlay"></div>
        </div>
    </div>

    <script>
// ─────────────────────────────────────────────────────────────────────────────
//  Sihirli Uçuş – Düzeltilmiş & iOS Uyumlu
// ─────────────────────────────────────────────────────────────────────────────

const canvas  = document.getElementById('game-canvas');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score-display');
const bestEl  = document.getElementById('best-display');
const startSc = document.getElementById('start-screen');
const overSc  = document.getElementById('game-over-screen');

canvas.width  = 480;
canvas.height = 640;

// ─── Ekran ölçekleme (iOS / mobil) ───────────────────────────────────────────
function resizeGame() {
    const wrapper = document.getElementById('game-wrapper');
    const sw = window.innerWidth;
    const sh = window.innerHeight;
    const scale = Math.min(sw / 480, sh / 640);
    wrapper.style.transform = `scale(${scale})`;
    // Wrapper'ı dikeyde ortalamak için margin-top ayarla
    const topOffset = Math.max(0, (sh - 640 * scale) / 2);
    wrapper.style.marginTop = topOffset + 'px';
}
resizeGame();
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));

// ─── Oyun sabitleri ───────────────────────────────────────────────────────────
const GRAVITY    = 0.21;   // kare başına yer çekimi (azaltıldı - daha iyi his)
const JUMP_VEL   = -6.5;   // zıplama hızı
const PIPE_W     = 70;     // boru genişliği
const CAP_H      = 22;     // kapak yüksekliği
const CAP_EX     = 10;     // kapak yan taşması
const GROUND_H   = 58;     // zemin yüksekliği
const BIRD_R     = 16;     // kuş çarpışma yarıçapı
const BIRD_X     = 105;    // kuşun sabit X konumu

// Başlangıç zorluk
const BASE_SPEED    = 2.5;
const BASE_GAP      = 178;
const BASE_INTERVAL = 1800;

// Maksimum zorluk (100 puanda erişilir)
const MAX_SPEED    = 5.8;
const MIN_GAP      = 105;
const MIN_INTERVAL = 1000;

/** Skora göre anlık zorluk (sınırsız – 100 puanda max zorluğa ulaşır) */
function getDiff(s) {
    const t    = Math.min(s / 100, 1);
    const ease = t * t * (3 - 2 * t); // smoothstep
    return {
        speed:    BASE_SPEED    + (MAX_SPEED    - BASE_SPEED)    * ease,
        gap:      BASE_GAP      - (BASE_GAP     - MIN_GAP)       * ease,
        interval: BASE_INTERVAL - (BASE_INTERVAL - MIN_INTERVAL) * ease,
    };
}

function getGapBounds(gap) {
    return {
        minY: 85,
        maxY: canvas.height - GROUND_H - gap - 85,
    };
}

// ─── Oyun durumu ──────────────────────────────────────────────────────────────
let mode      = 'start';  // 'start' | 'playing' | 'dead'
let score     = 0;
let best      = 0;
let pipes     = [];
let parts     = [];
let pipeMs    = 0;
let deadMs    = 0;
let gScroll   = 0;
let lastGapY  = (canvas.height - GROUND_H) / 2 - BASE_GAP / 2;
let overShown = false;
let lastTs    = 0;

const bird = { y: 0, vy: 0, rot: 0, wingT: 0 };

// ─── Yıldızlar ────────────────────────────────────────────────────────────────
const STARS = Array.from({ length: 85 }, () => ({
    x:     Math.random() * canvas.width,
    y:     Math.random() * (canvas.height - GROUND_H),
    r:     Math.random() * 1.5 + 0.4,
    a:     Math.random() * 0.55 + 0.3,
    spd:   Math.random() * 0.28 + 0.08,
    phase: Math.random() * Math.PI * 2,
}));

// ─── Yardımcılar ─────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;

function emit(x, y, color, n, spd) {
    for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const v = spd * (0.4 + Math.random() * 0.6);
        parts.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - 1.2,
                     life: 1, d: 0.018 + Math.random()*0.022,
                     r: 2 + Math.random()*4, color });
    }
}

// ─── Boru üretimi ─────────────────────────────────────────────────────────────
function spawnPipe() {
    const { gap } = getDiff(score);
    const { minY, maxY } = getGapBounds(gap);
    const lo   = clamp(lastGapY - 115, minY, maxY);
    const hi   = clamp(lastGapY + 115, minY, maxY);
    const gapY = lo + Math.random() * (hi - lo);
    lastGapY   = gapY;
    pipes.push({ x: canvas.width + 12, gapY, gap, scored: false });
}

// ─── Oyun Kontrolü ────────────────────────────────────────────────────────────
function startGame() {
    mode      = 'playing';
    score     = 0;
    pipes     = [];
    parts     = [];
    pipeMs    = BASE_INTERVAL * 0.55; // ilk boru yaklaşık 990ms sonra
    deadMs    = 0;
    gScroll   = 0;
    overShown = false;
    lastGapY  = (canvas.height - GROUND_H) / 2 - BASE_GAP / 2;

    bird.y    = canvas.height / 2;
    bird.vy   = JUMP_VEL;  // ← DÜZELTME: başlangıçta hemen zıpla
    bird.rot  = -0.3;
    bird.wingT = 0;

    scoreEl.textContent = '0';
    startSc.classList.remove('active');
    overSc.classList.remove('active');
    overSc.innerHTML = '';
}

function doJump(e) {
    if (e && e.target && typeof e.target.closest === 'function' && e.target.closest('button')) return;
    if (mode !== 'playing') return;
    bird.vy    = JUMP_VEL;
    bird.wingT = 0;
    emit(BIRD_X - 10, bird.y + 6, '#00ffc4', 5, 2.5);
}

function killBird() {
    if (mode !== 'playing') return;
    mode   = 'dead';
    deadMs = 0;
    if (score > best) {
        best = score;
        bestEl.textContent = 'En İyi: ' + best;
    }
    emit(BIRD_X, bird.y, '#00ffc4', 18, 5.5);
    emit(BIRD_X, bird.y, '#ffffff',  8, 4.0);
    emit(BIRD_X, bird.y, '#80ffe0', 10, 6.5);
}

function showGameOver() {
    overShown = true;
    const isRecord = score > 0 && score === best;
    overSc.innerHTML = `
        <div class="popup-content">
            <h2 class="lose-title">OYUN BİTTİ</h2>
            ${isRecord ? '<p class="record-badge">★ YENİ REKOR ★</p>' : ''}
            <div class="divider"></div>
            <div class="score-row">
                <div class="score-item">
                    <span class="score-label">Skor</span>
                    <span class="score-value">${score}</span>
                </div>
                <div class="score-item">
                    <span class="score-label">En İyi</span>
                    <span class="score-value">${best}</span>
                </div>
            </div>
            <button class="btn" id="rbtn">TEKRAR DENE</button>
        </div>`;
    overSc.classList.add('active');
    const rbtn = document.getElementById('rbtn');
    rbtn.addEventListener('touchstart', e => {
        e.stopPropagation();
        e.preventDefault();
        startGame();
    }, { passive: false });
    rbtn.addEventListener('click', e => {
        e.stopPropagation();
        startGame();
    });
}

// ─── Çarpışma ─────────────────────────────────────────────────────────────────
function checkCollision() {
    const groundTop = canvas.height - GROUND_H;
    const hr = BIRD_R * 0.76;
    const bx = BIRD_X, by = bird.y;

    if (by + hr >= groundTop) return true;
    if (by - hr <= 0)         return true;

    for (const p of pipes) {
        if (bx + hr <= p.x + 2 || bx - hr >= p.x + PIPE_W - 2) continue;
        if (by - hr < p.gapY || by + hr > p.gapY + p.gap) return true;
    }
    return false;
}

// ─── Çizim: Arka Plan ────────────────────────────────────────────────────────
function drawBg(t) {
    const gh = canvas.height - GROUND_H;
    const g  = ctx.createLinearGradient(0, 0, 0, gh);
    g.addColorStop(0,   '#070018');
    g.addColorStop(0.5, '#0d0430');
    g.addColorStop(1,   '#160740');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, gh);

    const nb = ctx.createRadialGradient(310, 170, 0, 310, 170, 210);
    nb.addColorStop(0, 'rgba(138,43,226,0.07)');
    nb.addColorStop(1, 'transparent');
    ctx.fillStyle = nb;
    ctx.fillRect(0, 0, canvas.width, gh);

    const moving = (mode === 'playing');
    STARS.forEach(s => {
        const tw = 0.5 + 0.5 * Math.sin(t * 0.0014 + s.phase);
        ctx.save();
        ctx.globalAlpha = s.a * tw;
        ctx.fillStyle   = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        if (moving) {
            s.x -= s.spd;
            if (s.x < 0) { s.x = canvas.width; s.y = Math.random() * gh; }
        }
    });
}

// ─── Çizim: Zemin ─────────────────────────────────────────────────────────────
function drawGround() {
    const gy = canvas.height - GROUND_H;
    const g  = ctx.createLinearGradient(0, gy, 0, canvas.height);
    g.addColorStop(0, '#140740');
    g.addColorStop(1, '#070220');
    ctx.fillStyle = g;
    ctx.fillRect(0, gy, canvas.width, GROUND_H);

    ctx.save();
    ctx.strokeStyle = '#8a2be2';
    ctx.lineWidth   = 2;
    ctx.shadowColor = '#8a2be2';
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(138,43,226,0.2)';
    ctx.lineWidth   = 1;
    const sp  = 44;
    const off = gScroll % sp;
    for (let x = -off - sp; x < canvas.width + sp; x += sp) {
        ctx.beginPath();
        ctx.moveTo(x, gy);
        ctx.lineTo(x + 28, canvas.height);
        ctx.stroke();
    }
    ctx.restore();
}

// ─── Çizim: Borular ───────────────────────────────────────────────────────────
function drawPipes() {
    const gy = canvas.height - GROUND_H;
    pipes.forEach(p => {
        const { x, gapY, gap } = p;
        const botY = gapY + gap;
        const topH = gapY;
        const botH = gy - botY;

        function makeGrad() {
            const g = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
            g.addColorStop(0,    '#0c0538');
            g.addColorStop(0.28, '#1e0e78');
            g.addColorStop(0.6,  '#150755');
            g.addColorStop(1,    '#08031e');
            return g;
        }

        ctx.save();
        ctx.shadowColor = '#7020e0';
        ctx.shadowBlur  = 7;

        ctx.fillStyle = makeGrad();
        if (topH - CAP_H > 0) ctx.fillRect(x, 0, PIPE_W, topH - CAP_H);
        ctx.fillStyle = '#251075';
        ctx.fillRect(x - CAP_EX, topH - CAP_H, PIPE_W + CAP_EX * 2, CAP_H);
        ctx.strokeStyle = '#6a1fd0';
        ctx.lineWidth   = 1.5;
        if (topH - CAP_H > 0) ctx.strokeRect(x, 0, PIPE_W, topH - CAP_H);
        ctx.strokeRect(x - CAP_EX, topH - CAP_H, PIPE_W + CAP_EX * 2, CAP_H);

        ctx.fillStyle = makeGrad();
        if (botH - CAP_H > 0) ctx.fillRect(x, botY + CAP_H, PIPE_W, botH - CAP_H);
        ctx.fillStyle = '#251075';
        ctx.fillRect(x - CAP_EX, botY, PIPE_W + CAP_EX * 2, CAP_H);
        if (botH - CAP_H > 0) ctx.strokeRect(x, botY + CAP_H, PIPE_W, botH - CAP_H);
        ctx.strokeRect(x - CAP_EX, botY, PIPE_W + CAP_EX * 2, CAP_H);

        ctx.restore();

        ctx.fillStyle = 'rgba(255,255,255,0.035)';
        if (topH - CAP_H > 0) ctx.fillRect(x + 5, 0, 7, topH - CAP_H);
        if (botH - CAP_H > 0) ctx.fillRect(x + 5, botY + CAP_H, 7, botH - CAP_H);
    });
}

// ─── Çizim: Kuş ───────────────────────────────────────────────────────────────
function drawBird() {
    const r  = BIRD_R;
    ctx.save();
    ctx.translate(BIRD_X, bird.y);
    ctx.rotate(bird.rot);

    ctx.shadowColor = '#00ffc4';
    ctx.shadowBlur  = 22;

    const bg = ctx.createRadialGradient(-r*0.28, -r*0.28, 0, 0, 0, r);
    bg.addColorStop(0,   '#c8fff5');
    bg.addColorStop(0.5, '#00ffc4');
    bg.addColorStop(1,   '#009a78');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, 0, r, r*0.87, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Kanat
    const flapY   = Math.sin(bird.wingT * 2.8) * 5.5;
    const flapRot = Math.sin(bird.wingT * 2.8) * 0.28;
    ctx.save();
    ctx.rotate(-0.18 + flapRot);
    ctx.translate(-r*0.1, flapY*0.45);
    const wg = ctx.createRadialGradient(0, 0, 0, 0, 0, r*0.72);
    wg.addColorStop(0, 'rgba(0,215,165,0.92)');
    wg.addColorStop(1, 'rgba(0,110,80,0.45)');
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.ellipse(-r*0.16, 0, r*0.72, r*0.28, -0.22, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Göz
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(r*0.42, -r*0.22, r*0.24, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#050015';
    ctx.beginPath(); ctx.arc(r*0.50, -r*0.22, r*0.13, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(r*0.54, -r*0.27, r*0.055, 0, Math.PI*2); ctx.fill();

    // Gaga
    ctx.fillStyle = '#ff9900';
    ctx.beginPath();
    ctx.moveTo(r*0.68,  r*0.02);
    ctx.lineTo(r*1.14,  r*0.14);
    ctx.lineTo(r*0.68,  r*0.30);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#cc7000'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(r*0.70, r*0.16); ctx.lineTo(r*1.10, r*0.16);
    ctx.stroke();

    ctx.restore();
}

// ─── Çizim: Partiküller ───────────────────────────────────────────────────────
function drawParts() {
    parts.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life + 0.5, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    });
}

// ─── Ana Döngü ────────────────────────────────────────────────────────────────
function frame(ts) {
    const dt = lastTs === 0 ? 0 : Math.min(ts - lastTs, 50);
    lastTs = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBg(ts);

    if (mode === 'playing') {
        // Fizik
        bird.vy    += GRAVITY;
        bird.y     += bird.vy;
        bird.rot    = clamp(bird.vy * 0.058, -0.48, 1.4);
        bird.wingT += 0.16;

        const diff = getDiff(score);

        // Boru zamanlayıcısı
        pipeMs += dt;
        if (pipeMs >= diff.interval) {
            pipeMs = 0;
            spawnPipe();
        }

        // Boruları hareket ettir + skor
        for (const p of pipes) {
            p.x -= diff.speed;
            if (!p.scored && p.x + PIPE_W < BIRD_X) {
                p.scored = true;
                score++;
                scoreEl.textContent = score;
                emit(BIRD_X, bird.y - 28, '#ffd700', 9, 3.5);
            }
        }
        pipes = pipes.filter(p => p.x + PIPE_W > 0);

        if (checkCollision()) killBird();

        gScroll += diff.speed;

        parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.life -= p.d; });
        parts = parts.filter(p => p.life > 0);

        drawPipes();
        drawParts();
        drawGround();
        drawBird();

    } else if (mode === 'dead') {
        deadMs += dt;

        const groundStop = canvas.height - GROUND_H - BIRD_R;
        if (bird.y < groundStop) {
            bird.vy  += GRAVITY * 0.65;
            bird.y   += bird.vy;
            bird.rot += 0.07;
            if (bird.y >= groundStop) { bird.y = groundStop; bird.vy = 0; }
        }

        parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.life -= p.d; });
        parts = parts.filter(p => p.life > 0);

        drawPipes();
        drawParts();
        drawGround();
        drawBird();

        if (deadMs >= 900 && !overShown) showGameOver();

    } else {
        // start – kuş sallanır
        bird.y     = canvas.height / 2 + Math.sin(ts * 0.0024) * 9;
        bird.rot   = 0;
        bird.wingT += 0.10;
        drawGround();
        drawBird();
    }

    requestAnimationFrame(frame);
}

// ─── Girdi (Klavye + Dokunma + Tıklama) ──────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        doJump(e);
    }
});

// Canvas tıklaması (masaüstü)
canvas.addEventListener('click', doJump);

// Canvas dokunma – SADECE canvas üzerinde (iOS'ta butonları bloke etmez)
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    doJump(e);
}, { passive: false });

// ─── Başlat butonu (iOS uyumlu) ───────────────────────────────────────────────
// touchstart + preventDefault → anında tepki, 300ms gecikme yok, çift tetik yok
const startBtn = document.getElementById('start-button');
startBtn.addEventListener('touchstart', e => {
    e.stopPropagation();
    e.preventDefault();   // sonraki click olayını engeller (çift tetik önleme)
    startGame();
}, { passive: false });
startBtn.addEventListener('click', e => {  // masaüstü için
    e.stopPropagation();
    startGame();
});

// ─── Başlatma ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    bird.y   = canvas.height / 2;
    bird.vy  = 0;
    bird.rot = 0;
    lastTs   = 0;
    requestAnimationFrame(frame);
});
    </script>
</body>
</html>
